      tags:
      - Admin
  /admin/scripts/{script_id}/status:
    post:
      consumes:
      - application/json
      description: 管理员更新指定脚本的启用状态
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 脚本ID
        in: path
        name: script_id
        required: true
        type: integer
      - description: 状态请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/admin.updateStatusRequest'
      produces:
