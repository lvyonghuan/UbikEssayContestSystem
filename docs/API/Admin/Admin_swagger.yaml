basePath: /api/v1
definitions:
  admin.updateStatusRequest:
    properties:
      isEnabled:
        type: boolean
    type: object
  model.Admin:
    properties:
      adminEmail:
        type: string
      adminID:
        type: integer
      adminName:
        type: string
      isActive:
        type: boolean
      password:
        type: string
    type: object
  model.Author:
    properties:
      authorEmail:
        type: string
      authorID:
        type: integer
      authorInfos:
        additionalProperties: {}
        type: object
      authorName:
        type: string
      password:
        type: string
      penName:
        type: string
    type: object
  model.BatchCreateSubAdminFailure:
    properties:
      email:
        type: string
      reason:
        type: string
    type: object
  model.BatchCreateSubAdminsRequest:
    properties:
      emails:
        items:
          type: string
        type: array
      permissionNames:
        items:
          type: string
        type: array
    type: object
  model.BatchCreateSubAdminsResponse:
    properties:
      created:
        items:
          $ref: '#/definitions/model.SubAdminCreateResult'
        type: array
      failed:
        items:
          $ref: '#/definitions/model.BatchCreateSubAdminFailure'
        type: array
    type: object
  model.Contest:
    properties:
      contestEndDate:
        description: 比赛结束时间，TIMESTAMP
        type: string
      contestID:
        type: integer
      contestIntroduction:
        description: 比赛简介
        type: string
      contestName:
        description: 比赛名称
        type: string
      contestStartDate:
        description: 比赛开始时间，TIMESTAMP
        type: string
    type: object
  model.CreateSubAdminRequest:
    properties:
      adminEmail:
        type: string
      adminName:
        type: string
      permissionNames:
        items:
          type: string
        type: array
    type: object
  model.FlowMount:
    properties:
      createdAt:
        type: string
      eventKey:
        type: string
      flowID:
        type: integer
      isEnabled:
        type: boolean
      mountID:
        type: integer
      scope:
        type: string
      targetID:
        type: integer
      targetType:
        type: string
    type: object
  model.FlowStep:
    properties:
      failureStrategy:
        type: string
      flowID:
        type: integer
      inputTemplate:
        additionalProperties: {}
        type: object
      isEnabled:
        type: boolean
      scriptID:
        type: integer
      scriptVersionID:
        type: integer
      stepID:
        type: integer
      stepName:
        type: string
      stepOrder:
        type: integer
      timeoutMs:
        type: integer
    type: object
  model.HandoverSuperAdminRequest:
    properties:
      newSuperAdminID:
        type: integer
    type: object
  model.Response:
    properties:
      code:
        description: 状态码，和http状态码剥离，以分离网络和业务
        example: 200
        type: integer
      msg:
        description: 信息。可以是NULL，也可以是成功时返回的结构体，也可以是失败时的错误信息
    type: object
  model.ScriptDefinition:
    properties:
      createdAt:
        type: string
      description:
        type: string
      interpreter:
        type: string
      isEnabled:
        type: boolean
      meta:
        additionalProperties: {}
        type: object
      scriptID:
        type: integer
      scriptKey:
        type: string
      scriptName:
        type: string
      updatedAt:
        type: string
    type: object
  model.ScriptFlow:
    properties:
      createdAt:
        type: string
      description:
        type: string
      flowID:
        type: integer
      flowKey:
        type: string
      flowName:
        type: string
      isEnabled:
        type: boolean
      meta:
        additionalProperties: {}
        type: object
      updatedAt:
        type: string
    type: object
  model.ScriptVersion:
    properties:
      checksum:
        type: string
      createdAt:
        type: string
      createdBy:
        type: integer
      fileName:
        type: string
      isActive:
        type: boolean
      relativePath:
        type: string
      scriptID:
        type: integer
      versionID:
        type: integer
      versionNum:
        type: integer
    type: object
  model.SubAdminCreateResult:
    properties:
      adminEmail:
        type: string
      adminID:
        type: integer
      adminName:
        type: string
      emailError:
        type: string
      emailSent:
        type: boolean
      tempPassword:
        type: string
    type: object
  model.SubAdminInfo:
    properties:
      adminEmail:
        type: string
      adminID:
        type: integer
      adminName:
        type: string
      isActive:
        type: boolean
      permissionNames:
        items:
          type: string
        type: array
    type: object
  model.Track:
    properties:
      contestID:
        type: integer
      trackDescription:
        description: 赛道描述
        type: string
      trackID:
        type: integer
      trackName:
        description: 赛道名称
        type: string
      trackSettings:
        additionalProperties: {}
        description: 赛道设置，存储为JSON格式
        type: object
    type: object
  model.UpdateSubAdminPermissionsRequest:
    properties:
      permissionNames:
        items:
          type: string
        type: array
    type: object
  model.Work:
    properties:
      authorID:
        type: integer
      authorName:
        type: string
      trackID:
        type: integer
      trackName:
        type: string
      workID:
        type: integer
      workInfos:
        additionalProperties: {}
        type: object
      workStatus:
        type: string
      workTitle:
        type: string
    type: object
  token.ResponseToken:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: Ubik 系统管理后台服务接口文档
  title: 管理后台 API
  version: "1.0"
paths:
  /admin/authors:
    get:
      consumes:
      - application/json
      description: 管理员按可选作者名查询作者列表
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 作者名，可选
        in: query
        name: author_name
        type: string
      - description: 偏移量，默认0
        in: query
        name: offset
        type: integer
      - description: 返回条数，默认20，最大100
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  items:
                    $ref: '#/definitions/model.Author'
                  type: array
              type: object
      summary: 获取作者列表
      tags:
      - Admin
  /admin/authors/{author_id}:
    delete:
      consumes:
      - application/json
      description: 管理员删除指定ID的作者
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 作者ID
        in: path
        name: author_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/model.Response'
      summary: 删除作者
      tags:
      - Admin
    get:
      consumes:
      - application/json
      description: 管理员根据作者ID获取作者详细信息
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 作者ID
        in: path
        name: author_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.Author'
              type: object
      summary: 获取作者详情
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: 管理员更新指定ID的作者信息
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 作者ID
        in: path
        name: author_id
        required: true
        type: integer
      - description: 更新后的作者信息
        in: body
        name: author
        required: true
        schema:
          $ref: '#/definitions/model.Author'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.Author'
              type: object
      summary: 更新作者
      tags:
      - Admin
  /admin/contest:
    post:
      consumes:
      - application/json
      description: 管理员创建新的征文活动
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 征文活动信息
        in: body
        name: contest
        required: true
        schema:
          $ref: '#/definitions/model.Contest'
      produces:
      - application/json
      responses:
        "200":
          description: 活动创建成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.Contest'
              type: object
      summary: 创建征文活动
      tags:
      - Admin
  /admin/contest/{contest_id}:
    delete:
      consumes:
      - application/json
      description: 管理员删除指定ID的征文活动
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 征文活动ID
        in: path
        name: contest_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 活动删除成功
          schema:
            $ref: '#/definitions/model.Response'
      summary: 删除征文活动
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: 管理员更新指定ID的征文活动
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 征文活动ID
        in: path
        name: contest_id
        required: true
        type: integer
      - description: 更新后的征文活动信息
        in: body
        name: contest
        required: true
        schema:
          $ref: '#/definitions/model.Contest'
      produces:
      - application/json
      responses:
        "200":
          description: 活动更新成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.Contest'
              type: object
      summary: 更新征文活动
      tags:
      - Admin
  /admin/login:
    post:
      consumes:
      - application/json
      description: 管理员使用用户名和密码登录，成功后返回JWT Token和Refresh Token
      parameters:
      - description: 管理员登录信息
        in: body
        name: admin
        required: true
        schema:
          $ref: '#/definitions/model.Admin'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/token.ResponseToken'
              type: object
      summary: 管理员后台登录
      tags:
      - Admin
  /admin/refresh:
    post:
      consumes:
      - application/json
      description: 管理员使用Refresh Token刷新JWT Token，成功后返回新的JWT Token和Refresh Token
      parameters:
      - description: Bearer {refresh_token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/token.ResponseToken'
              type: object
      summary: 刷新管理员JWT Token
      tags:
      - Admin
  /admin/script-flows:
    get:
      consumes:
      - application/json
      description: 管理员获取脚本流程列表
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  items:
                    $ref: '#/definitions/model.ScriptFlow'
                  type: array
              type: object
      summary: 获取脚本流程列表
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: 管理员创建脚本流程
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 脚本流程
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/model.ScriptFlow'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.ScriptFlow'
              type: object
      summary: 创建脚本流程
      tags:
      - Admin
  /admin/script-flows/{flow_id}:
    get:
      consumes:
      - application/json
      description: 管理员根据流程ID获取脚本流程
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 流程ID
        in: path
        name: flow_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.ScriptFlow'
              type: object
      summary: 获取脚本流程详情
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: 管理员更新指定脚本流程
      parameters:
      - description: Bearer {access_token}
        in: header
        name: Authorization
        required: true
        type: string
      - description: 流程ID
        in: path
        name: flow_id
        required: true
        type: integer
      - description: 更新后的流程
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/model.ScriptFlow'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                msg:
                  $ref: '#/definitions/model.ScriptFlow'
              type: object
